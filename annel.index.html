<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorpresa</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe6f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.caja{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    width:200px;
    margin:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#mensaje{
    display:none;
    font-size:2em;
    color:#ff1493;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="caja">
    <h2>Introduce la contraseña</h2>

    <input type="password" id="clave" placeholder="Contraseña">

    <br>

    <button onclick="verificar()">Entrar</button>

    <div id="mensaje">
        ❤️ Te quiero ❤️
    </div>
</div>

<script>
function verificar(){
    const contraseña = "Annel67skibidi";

    if(document.getElementById("clave").value === contraseña){
        document.getElementById("mensaje").style.display = "block";
    }else{
        alert("Contraseña incorrecta");
    }
}
</script>

</body>
</html>
